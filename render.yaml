services:
  # 1. Backend Service (Spring Boot Docker)
  - type: web
    name: pms-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # Set manually in Render Dashboard (Internal DB URL)
      - key: SPRING_DATASOURCE_USERNAME
        sync: false # Set manually (DB Username)
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Set manually (DB Password)
      - key: JWT_SECRET
        generateValue: true

  # 2. Frontend Service (React/Vite Static)
  - type: web
    name: pms-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pms-backend
          property: host


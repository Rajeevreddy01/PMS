services:
  # Backend Service
  - type: web
    name: pms-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # Set this to your existing Database's Internal URL
      - key: SPRING_DATASOURCE_USERNAME
        sync: false # Set this to your existing DB Username
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Set this to your existing DB Password
      - key: JWT_SECRET
        generateValue: true

  # Frontend Service
  - type: web
    name: pms-frontend
    env: static
    buildCommand: npm run build
    publishPath: frontend/dist
    plan: free
    region: ohio
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pms-backend
          property: host


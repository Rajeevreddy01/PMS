services:
  # 1. Backend Service (Spring Boot Docker)
  - type: web
    name: pms-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    # Explicitly set the port for Spring Boot
    envVars:
      - key: PORT
        value: "8080"
      - key: DB_HOST
        sync: false # Set to your Internal Database Host (e.g. dpg-xxx.render.com)
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false # Set to your DB Name (e.g. pms_db_bbnl)
      - key: SPRING_DATASOURCE_USERNAME
        sync: false # Set to your DB Username
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Set to your DB Password
      - key: JWT_SECRET
        generateValue: true

  # 2. Frontend Service (React/Vite Static)
  - type: web
    name: pms-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pms-backend
          property: host


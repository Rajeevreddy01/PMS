services:
  # Backend Service
  - type: web
    name: pms-backend
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    region: ohio
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false # Paste your existing Database Internal URL here
      - key: SPRING_DATASOURCE_USERNAME
        sync: false # Your existing Database username
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Your existing Database password
      - key: JWT_SECRET
        generateValue: true

  # Frontend Service (Corrected for Monorepo)
  - type: web
    name: pms-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    plan: free
    region: ohio
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: pms-backend
          property: host


# Server
server.port=${PORT:8080}




# Datasource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize data.sql after JPA
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true


# JWT
jwt.secret=pmsSecretKey2024SuperLongKeyForHMacSHA256SigningAlgorithm!@#
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:4200

# Logging
logging.level.com.pms=DEBUG
logging.level.org.springframework.security=DEBUG